<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página no encontrada - HomeClick24</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Inter", sans-serif;
      background: #f7f7f7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      text-align: center;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 48px;
      cursor: pointer;
    }

    .logo img {
      height: 36px;
      width: auto;
      margin-right: -18px;
    }

    .logo-text {
      font-size: 1.4rem;
      font-weight: 800;
      color: #1a1a1a;
    }

    .logo-text span { color: #7cc242; }

    .ilustracion {
      position: relative;
      margin-bottom: 32px;
    }

    .numero {
      font-size: 9rem;
      font-weight: 800;
      color: #f0f0f0;
      line-height: 1;
      user-select: none;
    }

    .casa-wrap {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 4rem;
    }

    h1 {
      font-size: 1.7rem;
      font-weight: 800;
      color: #1a1a1a;
      margin-bottom: 12px;
    }

    p {
      color: #999;
      font-size: 0.95rem;
      margin-bottom: 36px;
      max-width: 380px;
      line-height: 1.6;
    }

    .acciones {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      padding: 13px 28px;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      border: none;
      font-family: inherit;
      transition: all 0.2s ease;
    }

    .btn-green {
      background: #7cc242;
      color: #fff;
      box-shadow: 0 4px 14px rgba(124,194,66,0.35);
    }

    .btn-green:hover {
      background: #6aad35;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(124,194,66,0.45);
    }

    .btn-outline {
      background: #fff;
      border: 1.5px solid #eee;
      color: #555;
    }

    .btn-outline:hover {
      border-color: #7cc242;
      color: #7cc242;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>

  <div class="logo" onclick="location.href='/'">
    <img src="/CasaClick.png" alt="HomeClick24">
    <span class="logo-text">Home<span>Click24</span></span>
  </div>

  <div class="ilustracion">
    <div class="numero">404</div>
    <div class="casa-wrap">🏠</div>
  </div>

  <h1>Página no encontrada</h1>
  <p>La página que buscas no existe o ha sido eliminada. Pero hay muchas viviendas esperándote.</p>

  <div class="acciones">
    <a href="/" class="btn btn-green">🏠 Ir al inicio</a>
    <a href="/comprar.html" class="btn btn-outline">Ver propiedades</a>
  </div>

</body>
</html>
