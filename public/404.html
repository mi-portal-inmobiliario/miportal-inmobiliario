<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página no encontrada - Costa Hogar</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Inter", sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      text-align: center;
    }

    .logo {
      font-size: 1.6rem;
      font-weight: 800;
      color: #7cc242;
      margin-bottom: 40px;
      cursor: pointer;
    }

    .numero {
      font-size: 8rem;
      font-weight: 800;
      color: #7cc242;
      line-height: 1;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #222;
      margin-bottom: 12px;
    }

    p {
      color: #888;
      font-size: 1rem;
      margin-bottom: 32px;
      max-width: 400px;
    }

    .acciones {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      padding: 12px 28px;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      border: none;
      font-family: inherit;
    }

    .btn-green {
      background: #7cc242;
      color: #fff;
    }

    .btn-outline {
      background: transparent;
      border: 1.5px solid #ddd;
      color: #555;
    }

    .casa {
      font-size: 4rem;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>

  <div class="logo" onclick="location.href='/'">Costa Hogar</div>

  <div class="casa">🏠</div>
  <div class="numero">404</div>
  <h1>Página no encontrada</h1>
  <p>La página que buscas no existe o ha sido eliminada. Pero hay muchas viviendas esperándote.</p>

  <div class="acciones">
    <a href="/" class="btn btn-green">Ir al inicio</a>
    <a href="/comprar.html" class="btn btn-outline">Ver propiedades</a>
  </div>

</body>
</html>
