<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alquiler de propiedades - Costa Hogar</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>

<body>

<div id="main-header"></div>
<script src="/js/header.js" defer></script>

<!-- ACCESOS RÁPIDOS MÓVIL -->
<div class="mobile-quick-actions">
  <a href="/comprar.html" class="quick-btn">🏠 Comprar</a>
  <a href="/alquiler.html" class="quick-btn active">🔑 Alquilar</a>
  <a href="/publicar.html" class="quick-btn publish">➕ Publicar</a>
</div>

<div class="page-header">
  <div class="page-header-inner">
    <h1>Viviendas en alquiler</h1>
    <span id="resultado-count" class="result-count"></span>
  </div>
</div>

<div class="contenedor-comprar">

  <aside class="filtros">
    <h3>Filtros</h3>

    <label>Ciudad / Zona</label>
    <input type="text" id="f_texto" placeholder="Buscar ubicación...">

    <label>Precio mínimo</label>
    <input type="number" id="f_min" placeholder="€/mes">

    <label>Precio máximo</label>
    <input type="number" id="f_max" placeholder="€/mes">

    <label>Habitaciones</label>
    <select id="f_hab">
      <option value="">Todas</option>
      <option value="1">1+</option>
      <option value="2">2+</option>
      <option value="3">3+</option>
      <option value="4">4+</option>
    </select>

    <label>Ordenar por</label>
    <select id="f_sort">
      <option value="">Relevancia</option>
      <option value="precio_asc">Precio: menor a mayor</option>
      <option value="precio_desc">Precio: mayor a menor</option>
    </select>

    <button onclick="cargarPropiedades()">Aplicar filtros</button>
    <button class="btn-reset" onclick="resetFiltros()">Limpiar filtros</button>
  </aside>

  <section>
    <div class="lista-propiedades" id="lista"></div>
  </section>

</div>

<button class="btn-filtros-mobile" onclick="toggleFiltrosMobile()">
  ⚙️ Filtros
</button>

<script src="/js/filtros.js" defer></script>

</body>
</html>
