<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="/icons/icon-192x192.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comprar propiedades - HomeClick24</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
  <meta name="description" content="Viviendas en venta en España. Filtra por precio, habitaciones y zona. HomeClick24.">
  <meta property="og:title" content="Comprar vivienda — HomeClick24">
  <meta property="og:description" content="Encuentra tu vivienda ideal en venta. Filtra por precio, habitaciones y zona.">
  <meta property="og:type" content="website">

  <style>
    /* ===== PÁGINA HEADER ===== */
    .page-header {
      background: #fff;
      border-bottom: 1px solid #eee;
      padding: 18px 20px;
    }

    .page-header-inner {
      max-width: 1200px;
      margin: auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .page-header-inner h1 {
      font-size: 1.4rem;
      font-weight: 800;
      color: #1a1a1a;
    }

    .result-count {
      font-size: 0.88rem;
      color: #aaa;
      font-weight: 500;
      background: #f5f5f5;
      padding: 4px 12px;
      border-radius: 20px;
    }

    /* ===== FILTROS MEJORADOS ===== */
    .filtros {
      background: #fff;
      padding: 24px 20px;
      border-radius: 16px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.07);
      position: sticky;
      top: 90px;
      height: max-content;
      border: 1px solid rgba(0,0,0,0.04);
    }

    .filtros-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid #f0f0f0;
    }

    .filtros-header h3 {
      font-size: 1rem;
      font-weight: 800;
      color: #1a1a1a;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .filtros-reset {
      font-size: 0.8rem;
      color: #bbb;
      cursor: pointer;
      text-decoration: none;
      transition: color 0.2s;
    }

    .filtros-reset:hover { color: #7cc242; }

    .filtro-grupo {
      margin-bottom: 18px;
    }

    .filtro-grupo label {
      display: block;
      font-size: 0.8rem;
      font-weight: 700;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 7px;
    }

    .filtro-grupo input,
    .filtro-grupo select {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #eee;
      border-radius: 10px;
      font-size: 0.9rem;
      color: #333;
      background: #fafafa;
      transition: border-color 0.2s, background 0.2s;
      outline: none;
    }

    .filtro-grupo input:focus,
    .filtro-grupo select:focus {
      border-color: #7cc242;
      background: #fff;
    }

    .filtro-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    /* EXTRAS CHECKBOXES */
    .extras-grid {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .check-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border: 1.5px solid #eee;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.88rem;
      color: #444;
      background: #fafafa;
    }

    .check-item:hover {
      border-color: #7cc242;
      background: #f0f9e8;
    }

    .check-item input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: #7cc242;
      cursor: pointer;
    }

    .check-item.checked {
      border-color: #7cc242;
      background: #f0f9e8;
      color: #5a9e2f;
      font-weight: 600;
    }

    /* BOTONES FILTRO */
    .filtros-btns {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .btn-aplicar {
      width: 100%;
      padding: 12px;
      background: #7cc242;
      color: #fff;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
      font-size: 0.95rem;
      transition: all 0.2s ease;
      box-shadow: 0 4px 12px rgba(124,194,66,0.3);
    }

    .btn-aplicar:hover {
      background: #e5e5e5;
      transform: none;
      box-shadow: 0 6px 16px rgba(124,194,66,0.4);
    }

    .btn-limpiar {
      width: 100%;
      padding: 10px;
      background: #f0f0f0;
      color: #777;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.88rem;
      transition: all 0.2s;
      box-shadow: none;
    }

    .btn-limpiar:hover {
      background: #eee;
      color: #555;
    }

    /* SEPARADOR */
    .filtro-sep {
      height: 1px;
      background: #f0f0f0;
      margin: 4px 0 18px;
    }

    .check-item input[type="checkbox"] {
  width: 16px !important;
  height: 16px !important;
  margin: 0 !important;
  padding: 0 !important;
  flex-shrink: 0;
}

.extras-grid .check-item {
  display: flex !important;
  flex-direction: row !important;
  align-items: center !important;
  gap: 10px !important;
  padding: 9px 12px !important;
}

aside.filtros .btn-limpiar {
  background: #f0f0f0 !important;
  color: #777 !important;
  box-shadow: none !important;
  transform: none !important;
}

aside.filtros .btn-limpiar:hover {
  background: #e5e5e5 !important;
  color: #555 !important;
  transform: none !important;
}
  </style>
</head>

<body>

<div id="main-header"></div>
<script src="/js/header.js" defer></script>

<!-- ACCESOS RÁPIDOS MÓVIL -->
<div class="mobile-quick-actions">
  <a href="/comprar.html" class="quick-btn active">🏠 Comprar</a>
  <a href="/alquiler.html" class="quick-btn">🔑 Alquilar</a>
  <a href="/publicar.html" class="quick-btn publish">➕ Publicar</a>
</div>

<div class="page-header">
  <div class="page-header-inner">
    <h1>Viviendas en venta</h1>
    <span id="resultado-count" class="result-count"></span>
  </div>
</div>

<div class="contenedor-comprar">

  <!-- FILTROS -->
  <aside class="filtros">

    <div class="filtros-header">
      <h3>🔍 Filtros</h3>
      <span class="filtros-reset" onclick="resetFiltros()">Limpiar todo</span>
    </div>

    <div class="filtro-grupo">
      <label>Ciudad / Zona</label>
      <input type="text" id="f_texto" placeholder="Buscar ubicación...">
    </div>

    <div class="filtro-sep"></div>

    <div class="filtro-grupo">
      <label>Precio</label>
      <div class="filtro-row">
        <input type="number" id="f_min" placeholder="Mín €">
        <input type="number" id="f_max" placeholder="Máx €">
      </div>
    </div>

    <div class="filtro-grupo">
      <label>Habitaciones</label>
      <select id="f_hab">
        <option value="">Todas</option>
        <option value="1">1+</option>
        <option value="2">2+</option>
        <option value="3">3+</option>
        <option value="4">4+</option>
      </select>
    </div>

    <div class="filtro-grupo">
      <label>Baños</label>
      <select id="f_banos">
        <option value="">Todos</option>
        <option value="1">1+</option>
        <option value="2">2+</option>
        <option value="3">3+</option>
      </select>
    </div>

    <div class="filtro-grupo">
      <label>Superficie (m²)</label>
      <div class="filtro-row">
        <input type="number" id="f_sup_min" placeholder="Mín">
        <input type="number" id="f_sup_max" placeholder="Máx">
      </div>
    </div>

    <div class="filtro-sep"></div>

    <div class="filtro-grupo">
      <label>Tipo de inmueble</label>
      <select id="f_tipo_inmueble">
        <option value="">Todos</option>
        <option value="piso">Piso</option>
        <option value="casa">Casa</option>
        <option value="chalet">Chalet</option>
        <option value="apartamento">Apartamento</option>
        <option value="local">Local</option>
        <option value="oficina">Oficina</option>
        <option value="terreno">Terreno</option>
      </select>
    </div>

    <div class="filtro-grupo">
      <label>Estado</label>
      <select id="f_estado">
        <option value="">Todos</option>
        <option value="obra_nueva">Obra nueva</option>
        <option value="segunda_mano">Segunda mano</option>
      </select>
    </div>

    <div class="filtro-sep"></div>

    <div class="filtro-grupo">
      <label>Extras</label>
      <div class="extras-grid">
        <label class="check-item" id="label_garaje">
          <input type="checkbox" id="f_garaje" onchange="toggleCheck('label_garaje')">
          🚗 Garaje
        </label>
        <label class="check-item" id="label_piscina">
          <input type="checkbox" id="f_piscina" onchange="toggleCheck('label_piscina')">
          🏊 Piscina
        </label>
        <label class="check-item" id="label_terraza">
          <input type="checkbox" id="f_terraza" onchange="toggleCheck('label_terraza')">
          🌿 Terraza / Jardín
        </label>
      </div>
    </div>

    <div class="filtro-sep"></div>

    <div class="filtro-grupo">
      <label>Ordenar por</label>
      <select id="f_sort">
        <option value="">Relevancia</option>
        <option value="precio_asc">Precio: menor a mayor</option>
        <option value="precio_desc">Precio: mayor a menor</option>
      </select>
    </div>

    <div class="filtros-btns">
      <button class="btn-aplicar" onclick="cargarPropiedades()">Aplicar filtros</button>
      <button class="btn-limpiar" onclick="resetFiltros()">Limpiar filtros</button>
    </div>

  </aside>

  <!-- LISTA -->
  <section>
    <div class="lista-propiedades" id="lista"></div>
  </section>

</div>

<!-- FILTROS MÓVIL FLOTANTE -->
<button class="btn-filtros-mobile" onclick="toggleFiltrosMobile()">
  ⚙️ Filtros
</button>

<script>
function toggleCheck(labelId) {
  const label = document.getElementById(labelId);
  const cb = label.querySelector('input[type="checkbox"]');
  label.classList.toggle('checked', cb.checked);
}
</script>

<script src="/js/filtros.js" defer></script>

</body>
</html>
