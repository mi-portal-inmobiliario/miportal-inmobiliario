<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comprar propiedades - Costa Hogar</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
  <meta name="description" content="Viviendas en venta en la Costa. Filtra por precio, habitaciones y zona. Costa Hogar.">
  <meta property="og:title" content="Comprar vivienda — Costa Hogar">
  <meta property="og:description" content="Encuentra tu vivienda ideal en venta. Filtra por precio, habitaciones y zona.">
  <meta property="og:type" content="website">
</head>

<body>

<div id="main-header"></div>
<script src="/js/header.js" defer></script>

<!-- ACCESOS RÁPIDOS MÓVIL -->
<div class="mobile-quick-actions">
  <a href="/comprar.html" class="quick-btn active">🏠 Comprar</a>
  <a href="/alquiler.html" class="quick-btn">🔑 Alquilar</a>
  <a href="/publicar.html" class="quick-btn publish">➕ Publicar</a>
</div>

<div class="page-header">
  <div class="page-header-inner">
    <h1>Viviendas en venta</h1>
    <span id="resultado-count" class="result-count"></span>
  </div>
</div>

<div class="contenedor-comprar">

  <!-- FILTROS -->
  <aside class="filtros">
    <h3>Filtros</h3>

    <label>Ciudad / Zona</label>
    <input type="text" id="f_texto" placeholder="Buscar ubicación...">

    <label>Precio mínimo</label>
    <input type="number" id="f_min" placeholder="€">

    <label>Precio máximo</label>
    <input type="number" id="f_max" placeholder="€">

    <label>Habitaciones</label>
    <select id="f_hab">
      <option value="">Todas</option>
      <option value="1">1+</option>
      <option value="2">2+</option>
      <option value="3">3+</option>
      <option value="4">4+</option>
    </select>

    <label>Baños</label>
    <select id="f_banos">
      <option value="">Todos</option>
      <option value="1">1+</option>
      <option value="2">2+</option>
      <option value="3">3+</option>
    </select>

    <label>Superficie mínima (m²)</label>
    <input type="number" id="f_sup_min" placeholder="m²">

    <label>Superficie máxima (m²)</label>
    <input type="number" id="f_sup_max" placeholder="m²">

    <label>Tipo de inmueble</label>
    <select id="f_tipo_inmueble">
      <option value="">Todos</option>
      <option value="piso">Piso</option>
      <option value="casa">Casa</option>
      <option value="chalet">Chalet</option>
      <option value="apartamento">Apartamento</option>
      <option value="local">Local</option>
      <option value="oficina">Oficina</option>
      <option value="terreno">Terreno</option>
    </select>

    <label>Estado</label>
    <select id="f_estado">
      <option value="">Todos</option>
      <option value="obra_nueva">Obra nueva</option>
      <option value="segunda_mano">Segunda mano</option>
    </select>

    <label>Extras</label>
    <div style="display:flex; flex-direction:column; gap:8px; margin-top:4px;">
      <label style="display:flex; align-items:center; gap:8px; font-weight:400; cursor:pointer;">
        <input type="checkbox" id="f_garaje"> 🚗 Garaje
      </label>
      <label style="display:flex; align-items:center; gap:8px; font-weight:400; cursor:pointer;">
        <input type="checkbox" id="f_piscina"> 🏊 Piscina
      </label>
      <label style="display:flex; align-items:center; gap:8px; font-weight:400; cursor:pointer;">
        <input type="checkbox" id="f_terraza"> 🌿 Terraza/Jardín
      </label>
    </div>

    <label style="margin-top:12px;">Ordenar por</label>
    <select id="f_sort">
      <option value="">Relevancia</option>
      <option value="precio_asc">Precio: menor a mayor</option>
      <option value="precio_desc">Precio: mayor a menor</option>
    </select>

    <button onclick="cargarPropiedades()">Aplicar filtros</button>
    <button class="btn-reset" onclick="resetFiltros()">Limpiar filtros</button>
  </aside>
  
  <!-- LISTA -->
  <section>
    <div class="lista-propiedades" id="lista"></div>
  </section>

</div>

<!-- FILTROS MÓVIL FLOTANTE -->
<button class="btn-filtros-mobile" onclick="toggleFiltrosMobile()">
  ⚙️ Filtros
</button>

<script src="/js/filtros.js" defer></script>

</body>
</html>
