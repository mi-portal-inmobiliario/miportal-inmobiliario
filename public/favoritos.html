<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mis favoritos - CasaClick24</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
  <style>
    .favoritos-header {
      background: linear-gradient(135deg, #1a2332 0%, #2d3f55 100%);
      padding: 36px 20px;
      margin-bottom: 30px;
    }

    .favoritos-header-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .favoritos-header h1 {
      font-size: 1.7rem;
      font-weight: 800;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .favoritos-header .result-count {
      font-size: 0.82rem;
      font-weight: 700;
      color: #7cc242;
      background: rgba(124,194,66,0.15);
      padding: 4px 14px;
      border-radius: 20px;
      border: 1px solid rgba(124,194,66,0.3);
    }

    .favoritos-header a {
      padding: 10px 20px;
      background: #7cc242;
      color: #fff;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.88rem;
      transition: all 0.2s;
      white-space: nowrap;
      box-shadow: 0 4px 12px rgba(124,194,66,0.35);
    }

    .favoritos-header a:hover {
      background: #6aad35;
      transform: translateY(-1px);
    }

    .favoritos-wrap {
      max-width: 1200px;
      margin: 0 auto 80px;
      padding: 0 20px;
    }

    /* LISTA */
    .lista-propiedades {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }

    /* VACÍO */
    .favoritos-vacio {
      text-align: center;
      padding: 80px 20px;
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.06);
    }

    .favoritos-vacio .vacio-icono {
      width: 80px;
      height: 80px;
      background: #fff0f0;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      margin: 0 auto 20px;
    }

    .favoritos-vacio h2 {
      font-size: 1.4rem;
      font-weight: 800;
      color: #1a1a1a;
      margin-bottom: 10px;
    }

    .favoritos-vacio p {
      color: #999;
      font-size: 0.95rem;
      margin-bottom: 28px;
      line-height: 1.6;
    }

    .btn-buscar {
      display: inline-block;
      padding: 13px 28px;
      background: #7cc242;
      color: #fff;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.95rem;
      transition: all 0.2s ease;
      box-shadow: 0 4px 14px rgba(124,194,66,0.35);
    }

    .btn-buscar:hover {
      background: #6aad35;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(124,194,66,0.45);
    }

    @media (max-width: 900px) {
      .lista-propiedades { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 580px) {
      .lista-propiedades { grid-template-columns: 1fr; }
      .favoritos-header-inner { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>

<body>

<div id="main-header"></div>
<script src="/js/header.js" defer></script>

<!-- HEADER -->
<div class="favoritos-header">
  <div class="favoritos-header-inner">
    <h1>❤️ Mis favoritos</h1>
    <div style="display:flex;align-items:center;gap:12px;">
      <span id="resultado-count" class="result-count" style="display:none;"></span>
      <a href="/comprar.html">🔍 Buscar más</a>
    </div>
  </div>
</div>

<!-- LISTA -->
<div class="favoritos-wrap">
  <div id="listaFavoritos" class="lista-propiedades"></div>
  <div id="vacio" class="favoritos-vacio" style="display:none;">
    <div class="vacio-icono">❤️</div>
    <h2>Aún no tienes favoritos</h2>
    <p>Guarda las propiedades que te gusten pulsando el corazón<br>y encuéntralas aquí cuando quieras.</p>
    <a href="/comprar.html" class="btn-buscar">🔍 Explorar propiedades</a>
  </div>
</div>

<nav class="mobile-nav">
  <a href="/index.html"><span>🏠</span><small>Inicio</small></a>
  <a href="/comprar.html"><span>🔍</span><small>Buscar</small></a>
  <a href="/favoritos.html" class="active"><span>❤️</span><small>Favoritos</small></a>
  <a href="/perfil.html#chats"><span>💬</span><small>Chats</small></a>
  <a href="/perfil.html"><span>👤</span><small>Perfil</small></a>
</nav>

<script>
const usuario = JSON.parse(localStorage.getItem("usuario") || "null");
const token   = localStorage.getItem("token");

if (!usuario || !token) location.replace("/login.html");

async function cargarFavoritos() {
  try {
    const res  = await fetch(`/usuarios/${usuario._id}/favoritos`, {
      headers: { "Authorization": "Bearer " + token }
    });
    const data = await res.json();
    const cont  = document.getElementById("listaFavoritos");
    const count = document.getElementById("resultado-count");

    if (!data.length) {
      document.getElementById("vacio").style.display = "block";
      return;
    }

    count.textContent = `${data.length} propiedad${data.length !== 1 ? "es" : ""}`;
    count.style.display = "inline-block";

    cont.innerHTML = data.map(p => {
      const img     = p.imagenes?.[0] || "https://images.unsplash.com/photo-1580587771525-78b9dba3b914?w=600";
      const precio  = p.precio?.toLocaleString("es-ES") + " €";
      const tipo    = p.tipoOperacion === "venta" ? "Venta" : "Alquiler";
      const tipoCls = p.tipoOperacion === "venta" ? "tag-venta" : "tag-alquiler";
      const hab     = p.habitaciones ? `🛏 ${p.habitaciones} hab.` : "";
      const banos   = p.banos ? `🚿 ${p.banos} baño${p.banos > 1 ? "s" : ""}` : "";
      const sup     = p.superficie ? `📐 ${p.superficie} m²` : "";

      return `
        <div class="card-propiedad" onclick="location.href='/propiedad.html?id=${p._id}'">
          <div class="card-img-wrap">
            <img src="${img}" alt="${p.titulo}" loading="lazy">
            <span class="tag-tipo ${tipoCls}">${tipo}</span>
            <button class="btn-fav active" onclick="quitarFavorito(event, '${p._id}', this)" title="Quitar de favoritos">❤️</button>
          </div>
          <div class="card-body">
            <div class="card-precio">${precio}</div>
            <div class="card-titulo">${p.titulo}</div>
            <div class="card-direccion">📍 ${p.direccion}</div>
            ${hab || banos || sup ? `
              <div class="card-hab">
                ${[hab, banos, sup].filter(Boolean).join('<span style="color:#ddd">|</span>')}
              </div>` : ""}
          </div>
        </div>
      `;
    }).join("");

  } catch (e) {
    console.error(e);
  }
}

async function quitarFavorito(e, propiedadId, btn) {
  e.stopPropagation();
  btn.textContent = "🤍";

  await fetch(`/usuarios/${usuario._id}/favoritos/${propiedadId}`, {
    method: "DELETE",
    headers: { "Authorization": "Bearer " + token }
  });

  setTimeout(() => {
    btn.closest(".card-propiedad").style.opacity = "0";
    btn.closest(".card-propiedad").style.transform = "scale(0.95)";
    btn.closest(".card-propiedad").style.transition = "all 0.3s ease";
    setTimeout(() => {
      btn.closest(".card-propiedad").remove();
      const restantes = document.querySelectorAll(".card-propiedad").length;
      if (!restantes) {
        document.getElementById("vacio").style.display = "block";
        document.getElementById("resultado-count").style.display = "none";
      } else {
        document.getElementById("resultado-count").textContent =
          `${restantes} propiedad${restantes !== 1 ? "es" : ""}`;
      }
    }, 300);
  }, 100);
}

cargarFavoritos();
</script>

</body>
</html>
