<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- SEO dinámico (relleno por JS) -->
  <title>Propiedad en venta — HomeClick24</title>
  <meta name="description" content="Consulta los detalles completos de esta propiedad en HomeClick24. Fotos, precio, ubicación y contacto con el anunciante.">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://www.homeclick24.com/propiedad">

  <!-- Open Graph -->
  <meta property="og:title" content="Propiedad en HomeClick24">
  <meta property="og:description" content="Ver detalles, fotos, mapa y contactar con el anunciante.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://www.homeclick24.com/propiedad">
  <meta property="og:image" content="https://www.homeclick24.com/HomeClick-full.png">
  <meta property="og:image:secure_url" content="https://www.homeclick24.com/HomeClick-full.png">
  <meta property="og:image:alt" content="Propiedad en HomeClick24">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Propiedad en HomeClick24">
  <meta name="twitter:description" content="Ver detalles, fotos, mapa y contactar con el anunciante.">
  <meta name="twitter:image" content="https://www.homeclick24.com/HomeClick-full.png">

  <!-- CSS GLOBAL -->
  <link rel="stylesheet" href="/css/styles.css">
  <!-- CSS PROPIEDAD -->
  <link rel="stylesheet" href="/css/propiedad.css">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>

<body>

<!-- HEADER DINÁMICO -->
<div id="main-header"></div>
<script src="/js/header.js" defer></script>

<!-- CONTENIDO -->
<main class="container" id="contenedor">

  <!-- Skeleton / placeholder -->
  <section class="propiedad-skeleton">
    <h1>Cargando propiedad...</h1>
    <p>Estamos obteniendo la información.</p>
  </section>

</main>

<!-- MODAL IMÁGENES -->
<div class="modal" id="modal" onclick="cerrarModal()">
  <span class="modal-cerrar">×</span>
  <button class="modal-btn left" onclick="event.stopPropagation(); modalPrev()">‹</button>
  <img id="modal-img" alt="Imagen de la propiedad" onclick="event.stopPropagation()">
  <button class="modal-btn right" onclick="event.stopPropagation(); modalNext()">›</button>
</div>

<!-- LIBRERÍAS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- JS PROPIEDAD -->
<script src="/js/seo-slug.js" defer></script>
<script src="/js/propiedad.js" defer></script>
<script src="/js/propiedades-relacionadas.js" defer></script>

<!-- CHAT INLINE (NO TOCAR) -->
<script type="module" src="/js/chat-inline.js"></script>

<script src="/js/cookies.js"></script>

</body>
</html>
