<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar contraseña - Costa Hogar</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Inter", sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .auth-wrap { width: 100%; max-width: 420px; }
    .auth-logo {
      text-align: center;
      font-size: 1.8rem;
      font-weight: 800;
      color: #7cc242;
      margin-bottom: 28px;
      cursor: pointer;
    }
    .auth-card {
      background: #fff;
      border-radius: 18px;
      padding: 36px 32px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.09);
    }
    .auth-card h1 { font-size: 1.5rem; font-weight: 800; color: #222; margin-bottom: 6px; }
    .auth-card .subtitulo { font-size: 0.9rem; color: #888; margin-bottom: 28px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 0.85rem; font-weight: 600; color: #444; margin-bottom: 6px; }
    .form-group input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #ddd;
      border-radius: 10px;
      font-size: 0.95rem;
      font-family: inherit;
      transition: border-color 0.2s;
      box-sizing: border-box;
    }
    .form-group input:focus { border-color: #7cc242; outline: none; }
    .btn-auth {
      width: 100%;
      padding: 13px;
      background: #7cc242;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
      font-family: inherit;
      margin-top: 8px;
    }
    .btn-auth:hover { background: #63a831; }
    .btn-auth:disabled { background: #aaa; cursor: not-allowed; }
    .auth-footer { text-align: center; margin-top: 20px; font-size: 0.9rem; color: #666; }
    .auth-footer a { color: #7cc242; font-weight: 600; text-decoration: none; }
    .mensaje { text-align: center; margin-top: 14px; font-size: 0.9rem; font-weight: 600; min-height: 20px; }
  </style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-logo" onclick="location.href='/index.html'">Costa Hogar</div>
  <div class="auth-card">
    <h1>Recuperar contraseña</h1>
    <p class="subtitulo">Te enviaremos un enlace a tu email</p>
    <div class="form-group">
      <label>Correo electrónico</label>
      <input type="email" id="email" placeholder="tu@email.com"
             onkeydown="if(event.key==='Enter') recuperar()">
    </div>
    <button class="btn-auth" id="btnRecuperar" onclick="recuperar()">Enviar enlace</button>
    <p class="mensaje" id="mensaje"></p>
  </div>
  <div class="auth-footer">
    <a href="/login.html">← Volver al login</a>
  </div>
</div>

<script>
const API_BASE = location.hostname.includes("localhost")
  ? "http://localhost:3000"
  : "https://miportal-inmobiliario-server.onrender.com";

async function recuperar() {
  const email = document.getElementById("email").value.trim();
  const btn   = document.getElementById("btnRecuperar");
  const msg   = document.getElementById("mensaje");

  if (!email) { msg.textContent = "⚠️ Introduce tu email"; msg.style.color = "red"; return; }

  btn.disabled = true;
  btn.textContent = "Enviando...";

  const res  = await fetch(`${API_BASE}/auth/recuperar`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email })
  });

  msg.textContent = "✅ Si el email existe, recibirás un enlace en breve";
  msg.style.color = "green";
  btn.textContent = "Enviado";
}
</script>
</body>
</html>
